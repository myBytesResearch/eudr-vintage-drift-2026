name: reproducibility-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 1 * *'  # monthly bit-rot check

jobs:
  reproduce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nbconvert
      - name: Reproduce demo notebooks
        run: |
          for nb in notebooks/00_demo_soubre_civ.ipynb notebooks/01_audit_trail_example.ipynb; do
            jupyter nbconvert --to notebook --execute "$nb" \
              --output "executed_$(basename $nb)"
          done
      - name: Upload executed notebooks
        uses: actions/upload-artifact@v4
        with:
          name: executed-notebooks
          path: notebooks/executed_*.ipynb
